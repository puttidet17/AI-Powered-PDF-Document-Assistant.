<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF AI Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; flex-direction: column; }
        .main-container { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 300px; background-color: #ffffff; border-right: 1px solid #dee2e6; padding: 20px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background-color: #f1f3f5; padding: 20px; }
        .chat-box { flex: 1; background: #ffffff; border-radius: 8px; border: 1px solid #dee2e6; padding: 15px; overflow-y: auto; margin-bottom: 15px; }
        .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 15px; max-width: 75%; }
        .user-msg { background-color: #0d6efd; color: white; margin-left: auto; border-bottom-right-radius: 2px; }
        .ai-msg { background-color: #e9ecef; color: black; margin-right: auto; border-bottom-left-radius: 2px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand mb-0 h1">📚  ChatPDF.io </span>
    </nav>

    <div class="main-container">
        <div class="sidebar">
            <h5>1. Upload Document</h5>
            <hr>
            <form id="uploadForm">
                <div class="mb-3">
                    <input class="form-control" type="file" id="pdfFile" accept=".pdf" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="uploadBtn">Upload & Process</button>
            </form>
            <div id="uploadStatus" class="mt-3 alert d-none"></div>
        </div>

        <div class="chat-area">
            <h5>2. Ask the AI Assistant</h5>
            <div class="chat-box" id="chatBox">
                <div class="message ai-msg">Hello! Please upload a PDF file on the left, then ask me anything about its content.</div>
            </div>

            <form id="chatForm" class="d-flex gap-2">
                <input type="text" id="userInput" class="form-control" placeholder="Type your question here..." required disabled>
                <button type="submit" class="btn btn-dark" id="sendBtn" disabled>Send</button>
            </form>
        </div>
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const chatForm = document.getElementById('chatForm');
        const uploadStatus = document.getElementById('uploadStatus');
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const uploadBtn = document.getElementById('uploadBtn');

        // Handle PDF Upload via AJAX
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('pdfFile');
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            uploadStatus.className = "mt-3 alert alert-info";
            uploadStatus.textContent = "Processing PDF... Please wait.";
            uploadStatus.classList.remove('d-none');
            uploadBtn.disabled = true;

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();

                if (response.ok) {
                    uploadStatus.className = "mt-3 alert alert-success";
                    uploadStatus.textContent = data.message;
                    // Enable Chat Inputs
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                } else {
                    uploadStatus.className = "mt-3 alert alert-danger";
                    uploadStatus.textContent = data.error;
                    uploadBtn.disabled = false;
                }
            } catch (err) {
                uploadStatus.className = "mt-3 alert alert-danger";
                uploadStatus.textContent = "An error occurred during upload.";
                uploadBtn.disabled = false;
            }
        });

        // Handle Chat Submission
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            // Append User Message to Chat Box
            appendMessage(message, 'user-msg');
            userInput.value = '';

            // Show Thinking State
            const thinkingDiv = appendMessage('AI is thinking...', 'ai-msg');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();

                // Update thinking message with actual response
                thinkingDiv.textContent = data.response || data.error;
            } catch (err) {
                thinkingDiv.textContent = "Error connecting to AI server.";
            }
        });

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
